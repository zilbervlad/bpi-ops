{% if session.get('user_id') %}
<style>
    .doughy-mini-launcher {
        position: fixed;
        right: 22px;
        bottom: 22px;
        z-index: 9998;
    }

    .doughy-mini-button {
        border: 1px solid rgba(96, 165, 250, 0.35);
        background: rgba(37, 99, 235, 0.22);
        color: #ffffff;
        border-radius: 999px;
        padding: 9px 14px;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        font-weight: 900;
        font-size: 13px;
        cursor: pointer;
        white-space: nowrap;
        backdrop-filter: blur(10px);
    }

    .doughy-mini-button:hover {
        background: rgba(37, 99, 235, 0.32);
        transform: translateY(-1px);
    }

    .doughy-mini-icon {
        width: 22px;
        height: 22px;
        border-radius: 999px;
        object-fit: contain;
        background: rgba(255, 255, 255, 0.92);
        padding: 2px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
        flex: 0 0 auto;
    }

    .doughy-header-icon {
        width: 34px;
        height: 34px;
        border-radius: 12px;
        object-fit: contain;
        background: rgba(255, 255, 255, 0.94);
        padding: 3px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
        flex: 0 0 auto;
    }

    .doughy-mini-brand {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .doughy-mini-panel {
        position: fixed;
        right: 24px;
        bottom: 78px;
        width: 360px;
        max-width: calc(100vw - 32px);
        background: #111827;
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 18px;
        box-shadow: 0 22px 60px rgba(0, 0, 0, 0.32);
        z-index: 9999;
        display: none;
        overflow: hidden;
    }

    .doughy-mini-panel.open {
        display: block;
    }

    .doughy-mini-header {
        padding: 13px 14px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.16);
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .doughy-mini-header strong {
        color: #f8fafc;
        display: block;
        font-size: 14px;
    }

    .doughy-mini-header small {
        color: #94a3b8;
        font-size: 12px;
    }

    .doughy-mini-close {
        border: 0;
        background: rgba(255, 255, 255, 0.08);
        color: #e5e7eb;
        border-radius: 999px;
        width: 28px;
        height: 28px;
        cursor: pointer;
        font-size: 18px;
        line-height: 1;
    }

    .doughy-mini-body {
        padding: 14px;
        color: #e5e7eb;
        font-size: 13px;
    }

    .doughy-mini-muted {
        color: #94a3b8;
        margin: 0;
    }

    .doughy-mini-intro {
        margin-bottom: 12px;
    }

    .doughy-mini-title-line {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
        font-weight: 900;
        color: #f8fafc;
    }

    .doughy-context-card {
        margin: 10px 0 12px;
        padding: 10px 11px;
        border-radius: 13px;
        background: rgba(15, 23, 42, 0.55);
        border: 1px solid rgba(148, 163, 184, 0.18);
        color: #cbd5e1;
        font-size: 12px;
        line-height: 1.45;
    }

    .doughy-context-card strong {
        color: #f8fafc;
        font-weight: 900;
    }

    .doughy-quick-starts {
        display: grid;
        gap: 8px;
        margin-top: 12px;
    }

    .doughy-quick-button {
        width: 100%;
        border: 1px solid rgba(148, 163, 184, 0.22);
        background: rgba(255, 255, 255, 0.06);
        color: #e5e7eb;
        border-radius: 12px;
        padding: 10px 11px;
        text-align: left;
        font-weight: 800;
        font-size: 12px;
        cursor: pointer;
    }

    .doughy-quick-button:hover {
        background: rgba(37, 99, 235, 0.24);
        border-color: rgba(96, 165, 250, 0.38);
    }

    .doughy-coming-soon {
        display: none;
        margin-top: 12px;
        padding: 11px;
        border-radius: 13px;
        background: rgba(37, 99, 235, 0.14);
        border: 1px solid rgba(96, 165, 250, 0.24);
        color: #cbd5e1;
        line-height: 1.35;
    }

    .doughy-coming-soon.open {
        display: block;
    }

    @media (max-width: 720px) {
        .doughy-mini-launcher {
            right: 16px;
            bottom: calc(86px + env(safe-area-inset-bottom));
            z-index: 60;
        }

        .doughy-mini-panel {
            left: 12px;
            right: 12px;
            bottom: calc(148px + env(safe-area-inset-bottom));
            width: auto;
            max-width: none;
            max-height: calc(100vh - 170px);
            overflow: auto;
            z-index: 61;
        }

        .doughy-mini-button {
            width: 48px;
            height: 48px;
            padding: 0;
            justify-content: center;
            border-radius: 999px;
        }

        .doughy-mini-button span {
            display: none;
        }

        .doughy-mini-icon {
            width: 28px;
            height: 28px;
        }
    }
</style>

<div class="doughy-mini-launcher">
    <button type="button" class="doughy-mini-button" id="doughyMiniButton">
        <img src="{{ url_for('static', filename='doughy_happy.png') }}" alt="" class="doughy-mini-icon">
        <span>Doughy</span>
    </button>
</div>

<div class="doughy-mini-panel" id="doughyMiniPanel" aria-hidden="true">
    <div class="doughy-mini-header">
        <div class="doughy-mini-brand">
            <img src="{{ url_for('static', filename='doughy_happy.png') }}" alt="" class="doughy-header-icon">
            <div>
                <strong>Doughy</strong>
                <small>Ops helper</small>
            </div>
        </div>
        <button type="button" class="doughy-mini-close" id="doughyMiniClose" aria-label="Close Doughy">×</button>
    </div>

    <div class="doughy-mini-body">
        <div class="doughy-mini-intro">
            <div class="doughy-mini-title-line">
                <span>Ask Doughy</span>
            </div>
            <p class="doughy-mini-muted">Read-only ops help is coming soon.</p>
        </div>

        <div class="doughy-context-card"
             id="doughyContextCard"
             data-endpoint="{{ request.endpoint|default('', true) }}"
             data-page-label="{{ request.endpoint|default('Current page', true)|replace('_', ' ')|replace('.', ' / ')|title }}">
            <div><strong>Context</strong></div>
            <div id="doughyContextBody" class="doughy-context-muted">Checking where Doughy is...</div>
        </div>

        <div class="doughy-quick-starts" aria-label="Doughy quick starts">
            <button type="button" class="doughy-quick-button" data-doughy-soon="What needs attention today?">
                What needs attention today?
            </button>
            <button type="button" class="doughy-quick-button" data-doughy-soon="Summarize this page">
                Summarize this page
            </button>
            <button type="button" class="doughy-quick-button" data-doughy-soon="Draft a follow-up message">
                Draft a follow-up message
            </button>
        </div>

        <div class="doughy-coming-soon" id="doughyComingSoon" aria-live="polite">
            Coming soon: Doughy will answer this using read-only BPI Ops data.
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const button = document.getElementById("doughyMiniButton");
        const panel = document.getElementById("doughyMiniPanel");
        const close = document.getElementById("doughyMiniClose");

        if (!button || !panel || !close) return;

        button.addEventListener("click", function () {
            panel.classList.toggle("open");
            panel.setAttribute("aria-hidden", panel.classList.contains("open") ? "false" : "true");
        });

        close.addEventListener("click", function () {
            panel.classList.remove("open");
            panel.setAttribute("aria-hidden", "true");
        });

        document.querySelectorAll("[data-doughy-soon]").forEach(function (quickButton) {
            quickButton.addEventListener("click", function () {
                const soonBox = document.getElementById("doughyComingSoon");
                if (!soonBox) return;

                const prompt = quickButton.getAttribute("data-doughy-soon") || "this";

                if (prompt === "Summarize this page") {
                    const snapshot = buildDoughyVisibleSnapshot();

                    soonBox.innerHTML = `
                        <strong>Read-only page snapshot</strong><br>
                        Doughy can see this page has
                        <strong>${snapshot.statCards}</strong> stat/card areas,
                        <strong>${snapshot.tables}</strong> table(s),
                        and <strong>${snapshot.buttons}</strong> visible action button(s).<br>
                        ${snapshot.heading ? `View: <strong>${snapshot.heading}</strong><br>` : ""}
                        <span class="doughy-context-muted">AI summary is still off. This is only visible page structure.</span>
                    `;
                    soonBox.classList.add("open");
                    return;
                }

                if (prompt === "What needs attention today?") {
                    const attention = buildDoughyAttentionSnapshot();

                    if (attention.items.length === 0) {
                        soonBox.innerHTML = `
                            <strong>Read-only attention scan</strong><br>
                            I scanned <strong>${attention.scanned}</strong> visible page block(s), but I do not see obvious warning/open/failed items.<br>
                            <span class="doughy-context-muted">This is only scanning visible page text. AI and database checks are still off.</span>
                        `;
                    } else {
                        soonBox.innerHTML = `
                            <strong>Read-only attention scan</strong><br>
                            I found <strong>${attention.items.length}</strong> visible item(s) that may need attention:<br>
                            ${attention.items.map(item => `• ${escapeDoughyHtml(item)}`).join("<br>")}
                            <br><span class="doughy-context-muted">This is only scanning visible page text. AI and database checks are still off.</span>
                        `;
                    }

                    soonBox.classList.add("open");
                    return;
                }

                soonBox.textContent = "Coming soon: Doughy will answer “" + prompt + "” using read-only BPI Ops data.";
                soonBox.classList.add("open");
            });
        });
    });


    function buildDoughyVisibleSnapshot() {
        const headingEl = document.querySelector("main h1, main h2, .page-title, .dashboard-title, h1, h2");
        const heading = headingEl ? headingEl.textContent.trim().replace(/\s+/g, " ") : "";

        const visible = function (el) {
            if (!el) return false;
            const style = window.getComputedStyle(el);
            const rect = el.getBoundingClientRect();
            return style.display !== "none" &&
                style.visibility !== "hidden" &&
                rect.width > 0 &&
                rect.height > 0;
        };

        const statCards = Array.from(document.querySelectorAll(
            ".card, .stat-card, .metric-card, .dashboard-card, .summary-card, .tile, .kpi-card"
        )).filter(visible).length;

        const tables = Array.from(document.querySelectorAll("table")).filter(visible).length;

        const buttons = Array.from(document.querySelectorAll("button, .btn, a.btn"))
            .filter(visible)
            .filter(function (el) {
                return !el.closest(".doughy-mini-panel") && !el.closest(".doughy-mini-launcher");
            }).length;

        return {
            heading: heading,
            statCards: statCards,
            tables: tables,
            buttons: buttons
        };
    }


    function escapeDoughyHtml(value) {
        return String(value || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function buildDoughyAttentionSnapshot() {
        const keywords = [
            "warning",
            "danger",
            "urgent",
            "overdue",
            "open",
            "failed",
            "fail",
            "missing",
            "incomplete",
            "exception",
            "short",
            "shortage",
            "late",
            "not completed",
            "needs attention",
            "not done",
            "pending",
            "unassigned",
            "unverified",
            "cancelled",
            "cash difference",
            "difference",
            "variance",
            "low",
            "below",
            "issue"
        ];

        const visible = function (el) {
            if (!el) return false;
            if (el.closest(".doughy-mini-panel") || el.closest(".doughy-mini-launcher")) return false;

            const style = window.getComputedStyle(el);
            const rect = el.getBoundingClientRect();

            return style.display !== "none" &&
                style.visibility !== "hidden" &&
                rect.width > 0 &&
                rect.height > 0;
        };

        const cleanText = function (value) {
            return String(value || "").trim().replace(/\s+/g, " ");
        };

        const candidates = Array.from(document.querySelectorAll(
            "main .card, main .tile, main .dashboard-card, main .summary-card, main .stat-card, main .metric-card, main table tr, main li, main section, main article, .content .card, .content table tr, .app-content .card, .app-content table tr"
        )).filter(visible);

        const items = [];

        candidates.forEach(function (el) {
            const text = cleanText(el.textContent);
            if (!text || text.length < 4) return;
            if (text.length > 500) return;

            const lower = text.toLowerCase();
            const classHint = (el.className || "").toString().toLowerCase();

            const hasKeyword = keywords.some(function (keyword) {
                return lower.includes(keyword);
            });

            const hasClassHint =
                classHint.includes("warning") ||
                classHint.includes("danger") ||
                classHint.includes("error") ||
                classHint.includes("alert") ||
                classHint.includes("open") ||
                classHint.includes("failed") ||
                classHint.includes("red") ||
                classHint.includes("yellow");

            const percentMatches = lower.match(/\b(\d{1,3})\s*%/g) || [];
            const hasLowPercent = percentMatches.some(function (match) {
                const num = parseInt(match.replace(/[^0-9]/g, ""), 10);
                return !Number.isNaN(num) && num < 80;
            });

            const hasMoneyConcern =
                /\$\s*\d+/.test(lower) &&
                (
                    lower.includes("short") ||
                    lower.includes("difference") ||
                    lower.includes("variance") ||
                    lower.includes("cash")
                );

            const hasZeroOpen =
                /\b[1-9]\d*\b/.test(lower) &&
                (
                    lower.includes("open") ||
                    lower.includes("pending") ||
                    lower.includes("incomplete") ||
                    lower.includes("missing")
                );

            if (hasKeyword || hasClassHint || hasLowPercent || hasMoneyConcern || hasZeroOpen) {
                let cleaned = text;

                if (cleaned.length > 140) {
                    cleaned = cleaned.slice(0, 137) + "...";
                }

                if (!items.includes(cleaned)) {
                    items.push(cleaned);
                }
            }
        });

        return {
            items: items.slice(0, 8),
            scanned: candidates.length
        };
    }

    async function loadDoughyContext() {
        const body = document.getElementById("doughyContextBody");
        if (!body) return;

        try {
            const currentPath = window.location.pathname || "/";
            const contextCard = document.getElementById("doughyContextCard");
            const endpoint = contextCard ? contextCard.dataset.endpoint || "" : "";
            const pageLabel = contextCard ? contextCard.dataset.pageLabel || "" : "";

            const headingEl = document.querySelector("main h1, main h2, .page-title, .dashboard-title, h1, h2");
            const visibleHeading = headingEl ? headingEl.textContent.trim().replace(/\s+/g, " ") : "";
            const browserTitle = document.title ? document.title.trim().replace(/\s+/g, " ") : "";

            const params = new URLSearchParams({
                path: currentPath,
                endpoint: endpoint,
                page_label: pageLabel,
                visible_heading: visibleHeading,
                browser_title: browserTitle
            });

            const response = await fetch(`/doughy/context?${params.toString()}`, {
                headers: {
                    "Accept": "application/json"
                },
                credentials: "same-origin"
            });

            if (!response.ok) {
                body.textContent = "Context unavailable.";
                return;
            }

            const data = await response.json();

            const page = data.page || "unknown";
            const role = data.role || "unknown";
            const store = data.store || "not set";
            const company = data.company_id || "not set";
            const resourceId = data.resource_id || "none";
            const view = data.visible_heading || data.browser_title || "";

            body.innerHTML = `
                Page: <strong>${page}</strong><br>
                ${view ? `View: <strong>${view}</strong><br>` : ""}
                Role: <strong>${role}</strong><br>
                Store: <strong>${store}</strong><br>
                Company: <strong>${company}</strong><br>
                Page ID: <strong>${resourceId}</strong>
            `;
        } catch (error) {
            body.textContent = "Context unavailable.";
        }
    }

    document.addEventListener("DOMContentLoaded", loadDoughyContext);

</script>
{% endif %}
